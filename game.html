<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Kota Jastian</title>
  <style>body{margin:0;overflow:hidden;background:#87CEEB} #loading{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:white;font-size:18px;background:rgba(0,0,0,0.8);padding:15px;border-radius:10px}</style>
  <script type="importmap">{"imports": {"three": "https://unpkg.com/three@0.160.0/build/three.module.js"}}</script>
</head>
<body>
  <div id="loading">Loading map...</div>
<script type="module">
import * as THREE from 'three';
const scene=new THREE.Scene();scene.background=new THREE.Color(0x87CEEB);
const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,2000);
const renderer=new THREE.WebGLRenderer({antialias:true});renderer.setSize(innerWidth,innerHeight);document.body.appendChild(renderer.domElement);
scene.add(new THREE.AmbientLight(0xffffff,1));scene.add(new THREE.DirectionalLight(0xffffff,1).position.set(50,50,50));
const ground=new THREE.Mesh(new THREE.PlaneGeometry(1000,1000),new THREE.MeshLambertMaterial({color:0x4CAF50}));ground.rotation.x=-Math.PI/2;scene.add(ground);
const semuaTabrakan=[];const spawnX=0,spawnZ=30;

const player=new THREE.Group();player.add(new THREE.Mesh(new THREE.BoxGeometry(1,3,1),new THREE.MeshLambertMaterial({color:0x2196F3})).position.set(0,1.5,0));player.position.set(spawnX,0,spawnZ);scene.add(player);

function BikinRumah(x,z,warna){const g=new THREE.Group();g.add(new THREE.Mesh(new THREE.BoxGeometry(10,8,10),new THREE.MeshLambertMaterial({color:parseInt(warna)})).position.set(0,4,0));g.add(new THREE.Mesh(new THREE.ConeGeometry(8,4,4),new THREE.MeshLambertMaterial({color:0x8B0000})).position.set(0,10,0));g.position.set(x,0,z);scene.add(g);semuaTabrakan.push({pos:new THREE.Vector3(x,5,z),size:new THREE.Vector3(10,10,10)})}
function BikinPohon(x,z){const g=new THREE.Group();g.add(new THREE.Mesh(new THREE.CylinderGeometry(0.5,0.5,3),new THREE.MeshLambertMaterial({color:0x8B4513})).position.set(0,1.5,0));g.add(new THREE.Mesh(new THREE.SphereGeometry(2,8,8),new THREE.MeshLambertMaterial({color:0x2E8B57})).position.set(0,4,0));g.position.set(x,0,z);scene.add(g);semuaTabrakan.push({pos:new THREE.Vector3(x,2.5,z),size:new THREE.Vector3(4,5,4)})}

// PAKE LINK INI. INI YG BENER
fetch('https://raw.githack.com/jastianreynaldi13-commits/game-map-ku/main/map.json')
.then(res=>res.json()).then(data=>{
  document.getElementById('loading').style.display='none';
  data.rumah.forEach(r=>BikinRumah(r.x,r.z,r.warna));
  data.pohon.forEach(p=>BikinPohon(p.x,p.z));
}).catch(()=>{document.getElementById('loading').innerText="Gagal load. Cek nama file"});

let camD=15,camH=10,camA=0;addEventListener('touchmove',e=>{if(e.touches.length==1){camA+=(e.touches[0].clientX- innerWidth/2)*0.0001}});
addEventListener('keydown',e=>{if(e.key=='w')player.position.z-=0.3;if(e.key=='s')player.position.z+=0.3;if(e.key=='a')player.position.x-=0.3;if(e.key=='d')player.position.x+=0.3});
function loop(){let ox=Math.sin(camA)*camD,oz=Math.cos(camA)*camD;camera.position.set(player.position.x+ox,player.position.y+camH,player.position.z+oz);camera.lookAt(player.position);renderer.render(scene,camera);requestAnimationFrame(loop)}loop();
</script>
</body>
</html>
